name: Release Desktop Binaries

# Build & publish Tauri desktop binaries.
# Fires exactly ONCE per release — when a GitHub Release is published from
# the UI / API. Manual dispatch is also supported for ad-hoc rebuilds.
#
# Why only `release: published`?
#   - `push: tags` AND `release: created` AND `release: published` would all
#     fire when you click "Publish release" in the GitHub UI (the UI creates
#     the tag, drafts the release, then publishes it). That produces three
#     duplicate workflow runs racing to upload the same artifacts.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v0.1.0). A release will be created if missing.'
        required: true
        type: string

# Prevent any future overlap (e.g. multiple manual dispatches) from racing.
concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ''
          - name: macos-aarch64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - name: macos-x86_64
            os: macos-latest
            rust-target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - name: linux-x86_64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version from tag (single source of truth)
        shell: bash
        run: |
          # Strip the leading "v" from the tag (v1.0.0 -> 1.0.0). The tag is
          # the only place we declare a version; package.json / Cargo.toml /
          # tauri.conf.json are rewritten here so every artifact carries the
          # tag's version.
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "Stamping version $VERSION (from tag $TAG)"

          # tauri.conf.json — controls bundle filenames (e.g. _1.0.0_x64.msi).
          node -e "const fs=require('fs');const p='app/src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.version='${VERSION}';fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');"

          # package.json — controls the npm package's reported version.
          node -e "const fs=require('fs');const p='app/package.json';const j=JSON.parse(fs.readFileSync(p));j.version='${VERSION}';fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');"

          # Cargo.toml — controls the Rust crate version (env!("CARGO_PKG_VERSION")).
          # Only touch the [package].version line, not dependency versions.
          python - <<EOF
          import re, pathlib
          p = pathlib.Path('app/src-tauri/Cargo.toml')
          text = p.read_text()
          new = re.sub(
              r'(?m)^(\[package\][\s\S]*?^version\s*=\s*)"[^"]*"',
              r'\1"${VERSION}"',
              text,
              count=1,
          )
          p.write_text(new)
          EOF

          echo "--- Stamped files ---"
          grep -m1 '"version"' app/src-tauri/tauri.conf.json
          grep -m1 '"version"' app/package.json
          grep -m1 '^version' app/src-tauri/Cargo.toml

      - name: Install Linux build dependencies (cached)
        if: matrix.platform.os == 'ubuntu-22.04'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev build-essential curl wget file
          version: 1.0

      - name: Cache Tauri Windows bundler tools (WiX + NSIS)
        if: matrix.platform.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\tauri\WixTools314
            ~\AppData\Local\tauri\NSIS
          key: tauri-win-bundler-v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
          key: ${{ matrix.platform.rust-target }}

      - name: Install frontend dependencies
        working-directory: app
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        shell: bash

      - name: Build Tauri app and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required for the Tauri auto-updater.
          # The signing key is generated (without a passphrase) by the
          # "Generate Updater Signing Keys" workflow and stored in the
          # TAURI_SIGNING_PRIVATE_KEY repo secret. Public key lives in
          # app/src-tauri/tauri.conf.json → plugins.updater.pubkey.
          #
          # The password env var MUST be defined (Tauri errors if it's
          # missing) but it is intentionally empty: see the design note
          # in .github/workflows/generate-updater-keys.yml.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          # macOS code signing.
          # We don't have a paid Apple Developer ID, but Apple Silicon
          # (arm64) refuses to launch ANY unsigned Mach-O binary with the
          # error "app is damaged and can't be opened" — even before
          # Gatekeeper / quarantine kicks in. Setting the signing identity
          # to "-" tells codesign to apply a free ad-hoc signature, which
          # satisfies the kernel. Users will still see the normal
          # "unidentified developer" Gatekeeper prompt on first launch
          # (right-click → Open), but the binary will no longer be
          # reported as damaged.
          APPLE_SIGNING_IDENTITY: '-'
        with:
          projectPath: app
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: ${{ steps.tag.outputs.tag }}
          releaseBody: 'Automated build for ${{ steps.tag.outputs.tag }}. See assets below for installers.'
          releaseDraft: false
          prerelease: false
          # Tells tauri-action to also publish the updater manifest
          # (`latest.json`) alongside the installers so the in-app updater
          # can find new versions.
          updaterJsonPreferNsis: true
          args: ${{ matrix.platform.args }}

  rename-assets:
    name: Rename release assets to a uniform scheme
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename user-facing installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          # Why this job exists:
          # Tauri/cargo-bundle name each installer with the per-bundler
          # convention (x86_64 vs amd64 vs x64, no OS prefix, mixed _ and -).
          # That's confusing on a Releases page that mixes 3 platforms.
          # We rename only the files that are NOT referenced by latest.json
          # (renaming an updater-referenced file would break auto-update
          # for every already-installed user).
          #
          # Safe to rename:   .msi, .dmg, .deb, .rpm
          # MUST keep as-is:  setup.exe, .AppImage, .app.tar.gz, *.sig,
          #                   latest.json (all referenced by the updater
          #                   manifest or are the manifest itself).

          rename_asset() {
            local pattern="$1" newname="$2"
            local asset_json asset_name asset_id
            asset_json=$(gh api "repos/$REPO/releases/tags/$TAG" \
              --jq "[.assets[] | select(.name | test(\"$pattern\"))][0]")
            if [ -z "$asset_json" ] || [ "$asset_json" = "null" ]; then
              echo "skip: no asset matching /$pattern/"
              return 0
            fi
            asset_name=$(echo "$asset_json" | jq -r '.name')
            asset_id=$(echo "$asset_json" | jq -r '.id')
            if [ "$asset_name" = "$newname" ]; then
              echo "skip: $asset_name already named correctly"
              return 0
            fi
            echo "rename: $asset_name -> $newname"
            gh api -X PATCH "repos/$REPO/releases/assets/$asset_id" \
              -f name="$newname" >/dev/null
          }

          rename_asset '_x64_en-US\\.msi$'  "LaTeXStudio-${VERSION}-Windows-x64.msi"
          rename_asset '_x64\\.dmg$'        "LaTeXStudio-${VERSION}-macOS-Intel.dmg"
          rename_asset '_aarch64\\.dmg$'    "LaTeXStudio-${VERSION}-macOS-AppleSilicon.dmg"
          rename_asset '_amd64\\.deb$'      "LaTeXStudio-${VERSION}-Linux-x64.deb"
          rename_asset 'x86_64\\.rpm$'      "LaTeXStudio-${VERSION}-Linux-x64.rpm"

      - name: Delete stray signature files the updater never consults
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          # tauri-action signs EVERY bundle it produces, but the updater
          # manifest (latest.json) only references one installer per OS:
          #   - Windows: NSIS setup.exe   (updaterJsonPreferNsis: true)
          #   - macOS:   .app.tar.gz
          #   - Linux:   .AppImage
          # The .sig files for .msi / .deb / .rpm therefore have no
          # consumer and just clutter the Releases page. Drop them.

          delete_asset() {
            local pattern="$1"
            local asset_ids
            asset_ids=$(gh api "repos/$REPO/releases/tags/$TAG" \
              --jq ".assets[] | select(.name | test(\"$pattern\")) | .id")
            if [ -z "$asset_ids" ]; then
              echo "skip: no asset matching /$pattern/"
              return 0
            fi
            for id in $asset_ids; do
              local name
              name=$(gh api "repos/$REPO/releases/assets/$id" --jq '.name')
              echo "delete: $name (id=$id)"
              gh api -X DELETE "repos/$REPO/releases/assets/$id"
            done
          }

          delete_asset '\\.msi\\.sig$'
          delete_asset '\\.deb\\.sig$'
          delete_asset '\\.rpm\\.sig$'
