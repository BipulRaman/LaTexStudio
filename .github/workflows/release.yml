name: Release Desktop Binaries

# Build & publish Tauri desktop binaries.
# Fires exactly ONCE per release — when a GitHub Release is published from
# the UI / API. Manual dispatch is also supported for ad-hoc rebuilds.
#
# Why only `release: published`?
#   - `push: tags` AND `release: created` AND `release: published` would all
#     fire when you click "Publish release" in the GitHub UI (the UI creates
#     the tag, drafts the release, then publishes it). That produces three
#     duplicate workflow runs racing to upload the same artifacts.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v0.1.0). A release will be created if missing.'
        required: true
        type: string

# Prevent any future overlap (e.g. multiple manual dispatches) from racing.
concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ''
          - name: macos-aarch64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - name: macos-x86_64
            os: macos-latest
            rust-target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - name: linux-x86_64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version from tag (single source of truth)
        shell: bash
        run: |
          # Strip the leading "v" from the tag (v1.0.0 -> 1.0.0). The tag is
          # the only place we declare a version; package.json / Cargo.toml /
          # tauri.conf.json are rewritten here so every artifact carries the
          # tag's version.
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "Stamping version $VERSION (from tag $TAG)"

          # tauri.conf.json — controls bundle filenames (e.g. _1.0.0_x64.msi).
          node -e "const fs=require('fs');const p='app/src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.version='${VERSION}';fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');"

          # package.json — controls the npm package's reported version.
          node -e "const fs=require('fs');const p='app/package.json';const j=JSON.parse(fs.readFileSync(p));j.version='${VERSION}';fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');"

          # Cargo.toml — controls the Rust crate version (env!("CARGO_PKG_VERSION")).
          # Only touch the [package].version line, not dependency versions.
          python - <<EOF
          import re, pathlib
          p = pathlib.Path('app/src-tauri/Cargo.toml')
          text = p.read_text()
          new = re.sub(
              r'(?m)^(\[package\][\s\S]*?^version\s*=\s*)"[^"]*"',
              r'\1"${VERSION}"',
              text,
              count=1,
          )
          p.write_text(new)
          EOF

          echo "--- Stamped files ---"
          grep -m1 '"version"' app/src-tauri/tauri.conf.json
          grep -m1 '"version"' app/package.json
          grep -m1 '^version' app/src-tauri/Cargo.toml

      - name: Install Linux build dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
          key: ${{ matrix.platform.rust-target }}

      - name: Install frontend dependencies
        working-directory: app
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        shell: bash

      - name: Build Tauri app and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required for the Tauri auto-updater. Generate
          # the keypair once with `npm run tauri signer generate -- -w ./key`,
          # put the PRIVATE key (the file contents) into the GitHub secret
          # TAURI_SIGNING_PRIVATE_KEY and the passphrase you chose into
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD. Put the public key into
          # tauri.conf.json → plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: ${{ steps.tag.outputs.tag }}
          releaseBody: 'Automated build for ${{ steps.tag.outputs.tag }}. See assets below for installers.'
          releaseDraft: false
          prerelease: false
          # Tells tauri-action to also publish the updater manifest
          # (`latest.json`) alongside the installers so the in-app updater
          # can find new versions.
          updaterJsonPreferNsis: true
          args: ${{ matrix.platform.args }}
