name: Generate Updater Signing Keys

# One-shot helper workflow that runs `tauri signer generate` for you so you
# never need to install Tauri locally. Trigger it manually from the
# Actions tab.
#
# Design note — NO PASSPHRASE:
#   The private key is generated WITHOUT a passphrase. A "second secret"
#   (TAURI_SIGNING_PRIVATE_KEY_PASSWORD) added zero real security: the key
#   and its password would both live in GitHub Secrets, so an attacker who
#   can read one can read the other. Removing the passphrase eliminates a
#   whole class of CI breakage (shell escaping of '%', CRLF, trailing
#   newlines, etc.) that produced "Wrong password for that key" errors.
#
# Run this ONCE per project (or when you want to rotate the signing key).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: Generate keypair
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2

      - name: Generate keypair (no passphrase, CI mode)
        id: gen
        shell: bash
        run: |
          set -e
          mkdir -p out
          # --ci      : non-interactive, never prompts
          # --force   : overwrite if a previous key happens to exist
          # (no -p)   : generates a key with an EMPTY passphrase
          npx @tauri-apps/cli signer generate --ci --force -w out/key

          # `-w out/key` writes BOTH files: out/key (private) and out/key.pub (public)
          PUB="$(cat out/key.pub)"
          echo "----- PUBLIC KEY (paste into tauri.conf.json) -----"
          echo "$PUB"
          echo "---------------------------------------------------"

          # Mask the private key in the log so accidental scrolling cannot leak it.
          PRIV="$(cat out/key)"
          echo "::add-mask::$PRIV"

          {
            echo "public_key<<EOF"
            echo "$PUB"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload keypair artifact (1-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: tauri-signing-keypair
          path: out/
          if-no-files-found: error
          retention-days: 1

      - name: Print setup instructions
        shell: bash
        env:
          PUBLIC_KEY: ${{ steps.gen.outputs.public_key }}
        run: |
          cat <<EOF
          ============================================================
            TAURI UPDATER SIGNING KEYS GENERATED  (no passphrase)
          ============================================================

          Two things to do, then DELETE the artifact at the bottom of
          this run.

          ─────────────────────────────────────────────────────────
          STEP 1 — Edit app/src-tauri/tauri.conf.json
          ─────────────────────────────────────────────────────────

              "plugins": {
                "updater": {
                  ...
                  "pubkey": "${PUBLIC_KEY}"
                }
              }

          Commit and push that change.

          ─────────────────────────────────────────────────────────
          STEP 2 — Create / update the private-key repository secret
          ─────────────────────────────────────────────────────────
            Repo → Settings → Secrets and variables → Actions
                 → New repository secret  (or update existing)

            ┌───────────────────────────────────────────────────────┐
            │ SECRET NAME (copy exactly):                           │
            │                                                       │
            │     TAURI_SIGNING_PRIVATE_KEY                         │
            │                                                       │
            │ SECRET VALUE:                                         │
            │   The ENTIRE contents of the file named "key" inside  │
            │   the tauri-signing-keypair artifact (download it     │
            │   from the Artifacts section of this run).            │
            └───────────────────────────────────────────────────────┘

            You can DELETE the old TAURI_SIGNING_PRIVATE_KEY_PASSWORD
            secret — it is no longer used.

          ─────────────────────────────────────────────────────────
          STEP 3 — Delete the artifact
          ─────────────────────────────────────────────────────────
            Scroll to the Artifacts section of this run, find
            "tauri-signing-keypair", and click the trash icon.
            (It auto-expires in 1 day even if you forget.)

          ─────────────────────────────────────────────────────────
          DONE
          ─────────────────────────────────────────────────────────
            After this, every tagged release built by the
            "Release Desktop Binaries" workflow will publish a
            signed latest.json so the in-app updater can verify
            and install new versions.

            Lost the key? Re-run this workflow. Existing installs
            signed with the old key will NOT auto-update to releases
            signed by the new key (signature mismatch) and will need
            to reinstall manually.

          ============================================================
          EOF
