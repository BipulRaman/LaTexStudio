name: Generate Updater Signing Keys

# One-shot helper workflow that runs `tauri signer generate` for you so you
# never need to install Tauri locally. Trigger it manually from the
# Actions tab. It reads the passphrase from the
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD repo secret (create it first), then
# uploads the resulting private key as an artifact and prints the public
# key in the log.
#
# Run this ONCE per project (or when you want to rotate the signing key).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: Generate keypair
    runs-on: ubuntu-latest

    steps:
      - name: Verify passphrase secret is set
        env:
          PASSPHRASE: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$PASSPHRASE" ]; then
            echo "::error::Repo secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD is not set."
            echo "::error::Create it first: Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            echo "::error::Value: any passphrase you want to protect the signing key with"
            exit 1
          fi
          echo "Passphrase secret found, length: ${#PASSPHRASE} chars."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2

      - name: Generate keypair
        id: gen
        shell: bash
        env:
          PASSPHRASE: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          mkdir -p out
          # `tauri signer generate` is interactive — it prompts twice for the
          # passphrase. Feed it via stdin.
          printf '%s\n%s\n' "$PASSPHRASE" "$PASSPHRASE" \
            | npx @tauri-apps/cli signer generate -w out/key

          # `-w out/key` writes BOTH files: out/key (private) and out/key.pub (public)
          PUB="$(cat out/key.pub)"
          echo "----- PUBLIC KEY (paste into tauri.conf.json) -----"
          echo "$PUB"
          echo "---------------------------------------------------"

          # Mask the private key in the log so accidental scrolling cannot
          # leak it — you'll get it from the uploaded artifact instead.
          PRIV="$(cat out/key)"
          echo "::add-mask::$PRIV"

          # Persist the public key for the next step.
          {
            echo "public_key<<EOF"
            echo "$PUB"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload keypair artifact (1-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: tauri-signing-keypair
          path: out/
          if-no-files-found: error
          retention-days: 1

      - name: Print setup instructions
        shell: bash
        env:
          PUBLIC_KEY: ${{ steps.gen.outputs.public_key }}
        run: |
          cat <<EOF
          ============================================================
            TAURI UPDATER SIGNING KEYS GENERATED
          ============================================================

          The passphrase secret (TAURI_SIGNING_PRIVATE_KEY_PASSWORD)
          is already in place. Two more things to do, then DELETE
          the artifact at the bottom of this run.

          ─────────────────────────────────────────────────────────
          STEP 1 — Edit app/src-tauri/tauri.conf.json
          ─────────────────────────────────────────────────────────

              "plugins": {
                "updater": {
                  ...
                  "pubkey": "${PUBLIC_KEY}"
                }
              }

          Commit and push that change.

          ─────────────────────────────────────────────────────────
          STEP 2 — Create the private-key repository secret
          ─────────────────────────────────────────────────────────
            Repo → Settings → Secrets and variables → Actions
                 → New repository secret

            ┌───────────────────────────────────────────────────────┐
            │ SECRET NAME (copy exactly):                           │
            │                                                       │
            │     TAURI_SIGNING_PRIVATE_KEY                         │
            │                                                       │
            │ SECRET VALUE:                                         │
            │   The ENTIRE contents of the file named "key" inside  │
            │   the tauri-signing-keypair artifact (download it     │
            │   from the Artifacts section of this run).            │
            └───────────────────────────────────────────────────────┘

          ─────────────────────────────────────────────────────────
          STEP 3 — Delete the artifact
          ─────────────────────────────────────────────────────────
            Scroll to the Artifacts section of this run, find
            "tauri-signing-keypair", and click the trash icon.
            (It auto-expires in 1 day even if you forget.)

          ─────────────────────────────────────────────────────────
          DONE
          ─────────────────────────────────────────────────────────
            After this, every tagged release built by the
            "Release Desktop Binaries" workflow will publish a
            signed latest.json so the in-app updater can verify
            and install new versions.

            Lost the keys? Re-run this workflow. Note: existing
            installs signed with the old key will NOT auto-update
            to releases signed by the new key (signature mismatch)
            and will need to reinstall manually.

          ============================================================
          EOF
